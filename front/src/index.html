<!DOCTYPE html>
<html lang="fr" translate="no" class="notranslate">
    <head>
        <meta name="robots" content="noindex, nofollow" />
        <meta name="google" content="notranslate" />
        <meta charset="utf-8" />
        <title>Morgan And Mallet CRM</title>
        <base href="/" />

        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#1976d2" />
        <link
            href="https://fonts.googleapis.com/css?family=Roboto:300,400,500"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined&display=block"
            rel="stylesheet"
        />
        <style>
            div.app-loader {
                border: 10px solid #f3f3f3;
                border-radius: 50%;
                border-top: 10px solid #1691cc;
                width: 90px;
                height: 90px;
                margin: 120px auto 10px auto;
                -webkit-animation: spin 2s linear infinite;
                /* Safari */
                animation: spin 2s linear infinite;
            }

            /* Safari */

            @-webkit-keyframes spin {
                0% {
                    -webkit-transform: rotate(0deg);
                }

                100% {
                    -webkit-transform: rotate(360deg);
                }
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body>
        <app-root>
            <div class="app-loader"></div>
            <div
                style="
                    text-align: center;
                    margin-top: 30px;
                    font-size: 20px;
                    font-family: Arial;
                "
            >
                Loading...
            </div>
        </app-root>
        <noscript
            >Please enable JavaScript to continue using this
            application.</noscript
        >
    </body>
</html>

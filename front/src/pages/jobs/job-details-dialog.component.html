<h1 mat-dialog-title>Détails du Job</h1>
<div
    mat-dialog-content
    style="min-height: 200px; max-height: 60vh; overflow: auto"
>
    <div>
        <b>{{ job.name }}</b>
    </div>
    <div>
        <i>{{ job.description }}</i>
    </div>
    <div *ngIf="loading" style="margin: 20px auto; padding: 40px">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!loading">
        <table style="margin: 16px auto; width: 100%">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Durée</th>
                    <th>Résultat</th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngIf="job.jobHistory">
                    <tr *ngFor="let jobHistory of job.jobHistory">
                        <td>
                            {{ jobHistory.date | date : 'dd/MM/yyyy HH:mm:ss' }}
                        </td>
                        <td>{{ jobHistory.duration / 1000 }} s</td>
                        <td>{{ jobHistory.result }}</td>
                    </tr>
                </ng-container>
                <ng-container
                    *ngIf="!job.jobHistory || job.jobHistory.length === 0"
                >
                    <tr>
                        <td colspan="3">Aucun historique d'exécution</td>
                    </tr>
                </ng-container>
            </tbody>
        </table>
    </div>
</div>
<div mat-dialog-actions>
    <button mat-button mat-dialog-close>Close</button>
</div>

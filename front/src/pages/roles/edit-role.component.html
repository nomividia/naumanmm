<app-drawer-main-container>
    <div class="edit-page-header">
        <div class="left">
            <div *ngIf="hasPendingModifications">
                {{ 'Global.UnsavedChanges' | translate }}
            </div>
        </div>
        <div class="buttons-wrapper">
            <button
                mat-raised-button
                color="primary"
                [disabled]="loading"
                matTooltip="{{ 'ToolTip.Return' | translate }}"
                (click)="goBack()"
            >
                <mat-icon fontSet="material-icons-outlined"
                    >keyboard_arrow_left</mat-icon
                >Retour
            </button>
            <button
                [disabled]="loading"
                mat-raised-button
                color="primary"
                (click)="save(false)"
            >
                <mat-icon fontSet="material-icons-outlined">save</mat-icon
                >Sauvegarder
            </button>
            <button
                [disabled]="loading"
                mat-raised-button
                color="primary"
                (click)="save(true)"
            >
                <mat-icon fontSet="material-icons-outlined"
                    >exit_to_app</mat-icon
                >Sauvegarder et quitter
            </button>
            <button
                *ngIf="entity?.id"
                [color]="entity.enabled ? 'primary' : 'warn'"
                [disabled]="loading"
                mat-button
                (click)="archiveOrActiveUser()"
            >
                {{ entity.enabled ? 'Archiver' : 'Activer' }}
            </button>
        </div>
        <div class="right" *ngIf="loading">
            <mat-spinner diameter="30" strokeWidth="3"></mat-spinner>
        </div>
    </div>
    <div *ngIf="entity">
        <h1>
            <ng-container *ngIf="entityRefFieldValue !== 'new'"
                >Modification du rôle {{ entity.label }}</ng-container
            >
            <ng-container *ngIf="entityRefFieldValue === 'new'"
                >Création d'un rôle</ng-container
            >
        </h1>
        <div class="shadow-block">
            <div>
                <mat-form-field>
                    <mat-label>Nom du rôle</mat-label>
                    <input
                        matInput
                        type="text"
                        placeholder="Nom du rôle"
                        [(ngModel)]="entity.label"
                    />
                </mat-form-field>
                <mat-form-field style="margin: 0 10px">
                    <mat-label>Code du rôle</mat-label>
                    <input
                        matInput
                        type="text"
                        placeholder="Code du rôle"
                        [(ngModel)]="entity.role"
                    />
                </mat-form-field>
            </div>
        </div>

        <div class="shadow-block">
            <div style="margin: 10px 0"><u>Liste des droits associés :</u></div>
            <div *ngIf="rightsList?.length">
                <table class="roles-rights-list">
                    <tr
                        [ngClass]="{ 'disabled-right': !rightWrapper.checked }"
                        *ngFor="let rightWrapper of rightsList"
                    >
                        <td style="padding: 8px 10px">
                            <label
                                [attr.for]="
                                    'chk_role_right' +
                                    rightWrapper.right.code +
                                    '-input'
                                "
                                >{{ rightWrapper.right.label }}</label
                            >
                        </td>
                        <td style="padding: 8px 10px">
                            <mat-checkbox
                                color="primary"
                                [id]="
                                    'chk_role_right' + rightWrapper.right.code
                                "
                                [(ngModel)]="rightWrapper.checked"
                            ></mat-checkbox>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</app-drawer-main-container>

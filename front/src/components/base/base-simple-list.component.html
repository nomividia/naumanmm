<div class="nxs-list-page">
    <div class="nxs-list-page-filters"></div>
    <div class="nxs-list-page-content">
        <div class="loading-wrapper" [style.display]="loading ? '' : 'none'">
            <mat-spinner diameter="50" strokeWidth="6"></mat-spinner>

        <div *ngFor="let item of items"></div>
    </div>
    <div class="nxs-list-page-bottom"></div>
</div>

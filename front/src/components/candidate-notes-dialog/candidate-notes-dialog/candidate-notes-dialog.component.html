<div class="dialog-main-container" style="padding: 0px">
    <div class="d-flex">
        <h1 style="color: #d76004">Notes</h1>
        <button mat-icon-button class="close-btn" (click)="closeDialog()">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <table mat-table [dataSource]="dataSource" class="table">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let item" style="padding-right: 30px">
                {{ item.consultant?.firstName }}
            </td>
        </ng-container>

        <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let item">
                {{ item.modifDate | date : 'dd/MM/yyy HH:mm' }}
            </td>
        </ng-container>

        <ng-container matColumnDef="note">
            <th mat-header-cell *matHeaderCellDef>Note</th>
            <td mat-cell *matCellDef="let item">{{ item.content }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</div>

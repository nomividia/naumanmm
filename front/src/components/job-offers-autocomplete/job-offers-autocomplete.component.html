<nextalys-app-autocomplete
    [loadData]="loadJobOffer"
    [minLength]="2"
    [label]="label || 'CandidateApplication.JobOfferRef' | translate"
    [(ngModel)]="value"
    [matTooltip]="'CandidateApplication.JobOfferRef' | translate"
    matTooltipPosition="after"
    (clearInputClick)="value = null"
    [autoActiveFirstOption]="true"
    [autoCompleteIsLoading]="loading"
    [showClearButton]="true"
    [delay]="500"
    [disabled]="disabled"
    [autoClearInput]="true"
    [placeholder]="
        placeholder || 'CandidateApplication.JobOfferRef' | translate
    "
    [displayLabel]="displayFunction"
>
</nextalys-app-autocomplete>
